name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Kotlin compiler
        run: |
          curl -fsSL https://github.com/JetBrains/kotlin/releases/download/v2.4.0/kotlin-compiler-2.4.0.zip -o kotlin-compiler.zip
          unzip -q kotlin-compiler.zip -d /tmp/kotlin-compiler
          echo "/tmp/kotlin-compiler/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Verify Kotlin compiler
        run: kotlinc -version

      - name: Install Gradle
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Verify Gradle
        run: gradle -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm compile

      - name: Test
        run: pnpm test

      - name: Package extension
        run: pnpm package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-worksheet-vsix
          path: "*.vsix"
          if-no-files-found: error
