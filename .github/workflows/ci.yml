name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Compile
        run: pnpm compile

      - name: Test
        run: pnpm test

      - name: Package
        run: pnpm package

      - name: Verify VSIX size
        run: node -e "const fs = require('node:fs'); const files = fs.readdirSync('.').filter((file) => file.endsWith('.vsix')); if (files.length === 0) throw new Error('No VSIX found'); for (const file of files) { const bytes = fs.statSync(file).size; console.log(file + ' is ' + bytes + ' bytes'); if (bytes >= 1048576) throw new Error(file + ' exceeds 1 MiB'); }"

      - name: Verify isolated VSIX installation
        run: pnpm test:vsix-install

      - uses: actions/upload-artifact@v4
        with:
          name: kotlin-worksheet-${{ runner.os }}
          path: "*.vsix"
          if-no-files-found: error

  integration:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Kotlin compiler
        run: |
          curl -fsSL https://github.com/JetBrains/kotlin/releases/download/v2.4.0/kotlin-compiler-2.4.0.zip -o /tmp/kotlin-compiler.zip
          unzip -q /tmp/kotlin-compiler.zip -d /tmp/kotlin-compiler
          echo "/tmp/kotlin-compiler/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Kotlin and Gradle
        run: |
          kotlinc -version
          gradle --version

      - name: Compile extension
        run: pnpm compile

      - name: Run toolchain tests
        run: pnpm test

      - name: Run integration tests
        uses: coactions/setup-xvfb@v1
        with:
          run: pnpm test:integration
